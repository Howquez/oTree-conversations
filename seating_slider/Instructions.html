{{ block content }}

<div class="container-fluid p-0 m-0">
    <div class="row p-0 m-0 justify-content-center">

        <div class="col-12 col-lg-6 col-md-6 col overflow-auto p-3 mt-5 mb-5">

            <div class="row justify-content-center mt-3 mx-1 border-0">
                <div class="card shadow px-5 py-3 border-0">

                    <h5>
                        Seat Preference
                    </h5>

                    <p>
                        You have now completed the voice conversations.
                    </p>

                    <p>
                        For each seat pair you just discussed, we would like you to indicate how strongly you preferred one seat over the other.
                    </p>

                    <p>
                        Use the slider on each page to record your preference.
                    </p>

                    <div class="d-flex justify-content-center mt-3 mb-3">
                        <button class="btn btn-primary shadow" type="submit" id="submit_button">
                            Continue
                        </button>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

{{ endblock }}
