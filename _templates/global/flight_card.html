<div class="flight-card">
    <div class="fc-header">
        <span class="fc-label">Your flight</span>
        <span class="fc-class-badge">Economy</span>
    </div>

    <div class="fc-route">
        <div class="fc-airport">
            <div class="fc-iata">ZRH</div>
            <div class="fc-city">Zurich</div>
            <div class="fc-time">10:15</div>
        </div>

        <div class="fc-middle">
            <div class="fc-duration">9h 45min</div>
            <div class="fc-line">
                <div class="fc-line-bar"></div>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                </svg>
                <div class="fc-line-bar"></div>
            </div>
            <div class="fc-stops">Direct</div>
        </div>

        <div class="fc-airport" style="text-align: center;">
            <div class="fc-iata">JFK</div>
            <div class="fc-city">New York</div>
            <div class="fc-time">14:00</div>
        </div>
    </div>

    <div class="fc-footer">
        <span class="fc-meta">1 passenger &nbsp;·&nbsp; Thu, 14 May</span>
        <div class="fc-price-block">
            <div class="fc-price">$480</div>
            <div class="fc-price-note">per person, incl. taxes</div>
        </div>
    </div>
</div>
