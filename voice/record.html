{{ block styles }}
<link rel="stylesheet" href="{{ static 'css/record.css' }}">
{{ endblock }}

{{ block scripts }}
<script src="{{ static 'js/record.js' }}"></script>
{{ endblock }}

{{ block content }}

<h1 class="display-4"> Whisper API</h1>

<p>Use the voice recorder below to record your response:</p>

<!-- Content placeholder area (can hold text, images, or other content) -->
<div id="content-placeholder-container" class="content-placeholder-container">
    <div id="content-placeholder" class="placeholder-glow">
        <div class="placeholder-img placeholder col-12 mb-3"></div>
        <span class="placeholder col-6"></span>
        <span class="placeholder col-8"></span>
        <span class="placeholder col-4"></span>
    </div>
    <!-- Actual content goes here (hidden initially) -->
    <div id="content-area" style="display: none;"></div>
</div>

<div class="transcript-container">
    <div class="transcript-label">Transcript</div>
    <!-- Placeholder shown before transcript is ready -->
    <div id="transcript-placeholder" class="placeholder-glow">
        <span class="placeholder col-7"></span>
        <span class="placeholder col-4"></span>
        <span class="placeholder col-5"></span>
    </div>
    <!-- Actual transcript (hidden initially) -->
    <div id="id_transcript" class="transcript-text" style="display: none;"></div>
</div>

<div class="pill-spacer"></div>

<!-- Floating Voice Recorder Pill -->
<div class="voice-pill">
    <div class="recording-indicator" id="recording-indicator"></div>
    <span class="status-text" id="status-text">Ready to record</span>

    <!-- Record / Stop button -->
    <button type="button" class="pill-btn record-btn" id="record-toggle" title="Start recording">
        <svg id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg id="stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
    </button>

    <!-- Re-record button -->
    <button type="button" class="pill-btn" id="rerecord-btn" title="Re-record" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
    </button>

    <!-- Play button -->
    <button type="button" class="pill-btn" id="play-btn" title="Play recording" disabled>
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
        </svg>
    </button>

    <!-- Next/Submit button -->
    <button type="submit" class="pill-btn next-btn" id="submit_button" title="Next" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14"/>
            <path d="M12 5l7 7-7 7"/>
        </svg>
    </button>
</div>

<audio id="audio-playback"></audio>

{{ endblock }}
