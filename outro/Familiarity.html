{{ block content }}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-10 col-lg-6">
                <!-- Decision Card -->
                <div class="card rounded mt-5 shadow-lg">
                    <div class="card-body">
                        <h4 class="mb-0">
                            Think about the interface.
                        </h4>

                        <table class="table mt-4">
                            <colgroup>
                               <col span="1">
                               <col span="1">
                               <col span="1">
                               <col span="1">
                               <col span="1">
                               <col span="1">
                               <col span="1">
                               <col span="1">
                            </colgroup>
                            <tr>
                                <td></td>
                                <td colspan="3"><small>not at all<br>familiar</small></td>
                                <td></td>
                                <td colspan="3" class="text-end"><small>extremely<br>familiar</small></td>
                            </tr>
                                <tr>
                                    <td><small>{{ form.familiarity.label }}</small></td>
                                    {{ for choice in form.familiarity }}
                                        <td><small>{{ choice }}</small></td>
                                    {{ endfor }}
                                </tr>
                        </table>

                        <div class="d-flex justify-content-center m-3">
                            <button class="btn btn-primary shadow" type="submit" id="submitButton">
                                Submit
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

{{ endblock }}
