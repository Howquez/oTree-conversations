{{ block scripts }}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous">
{{ endblock }}

{{ block styles }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous">
{{ endblock }}


{{ block content }}

<div class="container-fluid border p-0 m-0">
    <div class="row p-0 m-0 justify-content-center">

        <!-- Navbar
        <div class="d-flex m-0 p-0 sticky-top justify-content-center shadow-sm bg-white bg-opacity-75">
            <h1 class="display-6 my-3">
                Instructions
            </h1>
        </div>
        -->

        <div class="col-12 col-lg-6  col-md-6 col overflow-auto p-3 mt-5 mb-5">

            <div class="row justify-content-center mt-3 mx-1 border-0">
                <div class="card shadow px-5 py-3 border-0">

                    <h5>
                        Questionnaire
                    </h5>

                    <p class="">
                        You just finished the first part of this study.
                        We will now ask you some questions to conclude this study.
                    </p>


                    <div class="d-flex justify-content-center mt-3 mb-3">
                        <button class="btn btn-primary shadow" type="submit" id="submit_button">
                            Start Questionnaire
                        </button>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

{{ endblock }}
